<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageGeneration.co.in</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

nav{
display:flex;
justify-content:space-around;
background:#1c1c1c;
padding:12px;
position:sticky;
top:0;
z-index: 100;
}

nav button{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:14px;
}

.page{display:none;padding:15px;max-width:900px;margin:auto;}
.active{display:block;}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-top:15px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

input{background:#222;color:white;}
button{background:#00aaff;color:white;cursor:pointer;}

img{width:100%;margin-top:15px;border-radius:10px;display:none;}
.small{text-align:center;color:#aaa;font-size:13px;}
</style>
</head>

<body>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('features')">Features</button>
<button onclick="show('about')">About</button>
<button onclick="show('contact')">Contact</button>
</nav>

<div id="home" class="page active">

<h2 style="text-align:center;">AI Image Generator</h2>

<div class="card">

<input id="prompt" placeholder="Enter prompt">

<button onclick="generate()">Generate Image</button>

<img id="img">

<button onclick="copy()">Copy URL</button>
<button onclick="downloadImg()">Download Image</button>

<p id="status" class="small"></p>

</div>
</div>

<div id="features" class="page">
<div class="card">
✔ AI Image Search<br>
✔ Copy Image URL<br>
✔ Download Image<br>
✔ Ads Integration<br>
✔ Mobile Friendly<br>
</div>
</div>

<div id="about" class="page">
<div class="card">
ImageGeneration.co.in is an AI image search tool using Pexels API.
</div>
</div>

<div id="contact" class="page">
<div class="card">
Email: contact@imagegeneration.co.in
</div>
</div>

<script>

let current = "";

/* IMPORTANT: PEXELS API KEY */
const PEXELS_API_KEY = "UrZGxVi4hcxO7ciX2sD7VVM5Gf8H7zcZDYsC1Pp35X9fOQkUS8zSOqEb";

/* YOUR DIRECT AD LINK */
const AD_URL = "https://omg10.com/4/11155181";

/* PAGE SWITCH */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* GLOBAL AD POPUP FUNCTION */
function triggerAd() {
window.open(AD_URL, "_blank");
}

/* GENERATE */
async function generate(){
const prompt=document.getElementById("prompt").value;
if(!prompt)return alert("Enter prompt");

document.getElementById("status").innerText="Loading...";

const res=await fetch(`https://api.pexels.com/v1/search?query=${prompt}&per_page=1`,{
headers:{Authorization:PEXELS_API_KEY}
});

const data=await res.json();

if(!data.photos.length){
document.getElementById("status").innerText="No image";
return;
}

current=data.photos[0].src.original;

document.getElementById("img").src=current;
document.getElementById("img").style.display="block";

document.getElementById("status").innerText="Done";
}

/* COPY + ADS (Ad triggers only here now) */
function copy(){
if(!current) return alert("Generate an image first");
navigator.clipboard.writeText(current);
alert("Copied!");

triggerAd();
}

/* DOWNLOAD (Clean download without ads) */
async function downloadImg(){
if(!current) return alert("Generate an image first");

document.getElementById("status").innerText="Downloading...";

try {
const response = await fetch(current);
const blob = await response.blob();
const blobUrl = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = blobUrl;
a.download = "generated-image.jpg";
document.body.appendChild(a);
a.click();

document.body.removeChild(a);
window.URL.revokeObjectURL(blobUrl);

document.getElementById("status").innerText="Downloaded Successfully";

} catch (error) {
console.error(error);
document.getElementById("status").innerText="Download failed. Try copying the URL instead.";
window.open(current, "_blank");
}
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageGeneration.co.in</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

nav{
display:flex;
justify-content:space-around;
background:#1c1c1c;
padding:12px;
position:sticky;
top:0;
z-index: 100;
}

nav button{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:14px;
}

.page{display:none;padding:15px;max-width:900px;margin:auto;}
.active{display:block;}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-top:15px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

input{background:#222;color:white;}
button{background:#00aaff;color:white;cursor:pointer;}

img{width:100%;margin-top:15px;border-radius:10px;display:none;}
.small{text-align:center;color:#aaa;font-size:13px;}
</style>
</head>

<body>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('features')">Features</button>
<button onclick="show('about')">About</button>
<button onclick="show('contact')">Contact</button>
</nav>

<div id="home" class="page active">

<h2 style="text-align:center;">AI Image Generator</h2>

<div class="card">

<input id="prompt" placeholder="Enter prompt">

<button onclick="generate()">Generate Image</button>

<img id="img">

<button onclick="copy()">Copy URL</button>
<button onclick="downloadImg()">Download Image</button>

<p id="status" class="small"></p>

</div>
</div>

<div id="features" class="page">
<div class="card">
✔ AI Image Search<br>
✔ Copy Image URL<br>
✔ Download Image<br>
✔ Ads Integration<br>
✔ Mobile Friendly<br>
</div>
</div>

<div id="about" class="page">
<div class="card">
ImageGeneration.co.in is an AI image search tool using Pexels API.
</div>
</div>

<div id="contact" class="page">
<div class="card">
Email: contact@imagegeneration.co.in
</div>
</div>

<script>

// Separate ad counters to limit ad displays per session
let generalAdCount = 0;
let generateAdCount = 0;

const MAX_GENERAL_ADS = 3;  // Maximum ads for Copy/Download buttons
const MAX_GENERATE_ADS = 2; // Maximum ads strictly for the Generate button

/* IMPORTANT: PEXELS API KEY */
const PEXELS_API_KEY = "UrZGxVi4hcxO7ciX2sD7VVM5Gf8H7zcZDYsC1Pp35X9fOQkUS8zSOqEb";

/* YOUR DIRECT AD LINK */
const AD_URL = "https://omg10.com/4/11155181";

/* AUTOMATIC RELOAD CAPABILITY ON PAGE INTRUSION */
window.onload = function() {
    const savedSrcUrl = localStorage.getItem("saved_pexels_url");
    const savedBase64 = localStorage.getItem("saved_base64_data");
    const imgElement = document.getElementById("img");

    if(savedBase64) {
        imgElement.src = savedBase64;
        imgElement.style.display = "block";
        document.getElementById("status").innerText = "Restored previous image";
    }
};

/* PAGE SWITCH */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* LIMITED AD POPUP FOR UTILITIES (COPY / DOWNLOAD) */
function triggerGeneralAd() {
if (generalAdCount < MAX_GENERAL_ADS) {
window.open(AD_URL, "_blank");
generalAdCount++;
}
}

/* LIMITED AD POPUP FOR GENERATION */
function triggerGenerateAd() {
if (generateAdCount < MAX_GENERATE_ADS) {
window.open(AD_URL, "_blank");
generateAdCount++;
}
}

/* GENERATE WITH BULLETPROOF BROWSER-DISK CACHING */
async function generate(){
const prompt=document.getElementById("prompt").value;
if(!prompt)return alert("Enter prompt");

document.getElementById("status").innerText="Processing hardware storage cache...";

try {
const res=await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(prompt)}&per_page=1`,{
headers:{Authorization:PEXELS_API_KEY}
});

const data=await res.json();

if(!data.photos || !data.photos.length){
document.getElementById("status").innerText="No image found";
return;
}

const rawUrl = data.photos[0].src.original;
const imgElement = document.getElementById("img");

// Fetch the physical file bytes to write inside system storage
const imageResponse = await fetch(rawUrl);
const imageBlob = await imageResponse.blob();

const reader = new FileReader();
reader.readAsDataURL(imageBlob);
reader.onloadend = function() {
    const stringDataStream = reader.result;
    
    // Write data permanently onto user storage space disk hardware
    localStorage.setItem("saved_pexels_url", rawUrl);
    localStorage.setItem("saved_base64_data", stringDataStream);
    
    // Assign view asset
    imgElement.src = stringDataStream;
    imgElement.style.display = "block";
    document.getElementById("status").innerText = "Done";

    // Launch ad target safely
    setTimeout(() => {
        triggerGenerateAd();
    }, 250);
};

} catch (err) {
console.error(err);
document.getElementById("status").innerText="Error generating image asset.";
}
}

/* COPY + LIMITED ADS */
function copy(){
const savedSrcUrl = localStorage.getItem("saved_pexels_url");
if(!savedSrcUrl) return alert("Generate an image first");

navigator.clipboard.writeText(savedSrcUrl);
alert("Copied!");

triggerGeneralAd();
}

/* DOWNLOAD FUNCTION */
async function downloadImg(){
const savedBase64 = localStorage.getItem("saved_base64_data");
if(!savedBase64) return alert("Generate an image first");

triggerGeneralAd();
document.getElementById("status").innerText="Downloading...";

try {
const a = document.createElement("a");
a.href = savedBase64;
a.download = `ai-image-${Date.now()}.jpg`;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

document.getElementById("status").innerText="Downloaded Successfully";
} catch (error) {
console.error(error);
document.getElementById("status").innerText="Download failed.";
}
}

</script>

</body>
</html>
